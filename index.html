<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Tra Cứu & Quản Lý MST</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link
      rel="icon"
      type="image/png"
      href="https://img.icons8.com/ios-filled/50/2563eb/bug.png"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>Báo Cáo</h2>

    <div id="toastNotification" class="toast">Đã lưu dữ liệu thành công!</div>

    <div class="container">
      <table id="tblData">
        <thead>
          <tr>
            <th style="width: 15%">Mã số thuế</th>
            <th style="width: 13%">Số điện thoại</th>
            <th style="width: 25%">Tên công ty</th>
            <th style="width: 10%">Dịch vụ</th>
            <th style="width: 12%">Người xử lý</th>
            <th style="width: 13%">Vấn đề</th>
            <th style="width: 12%">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input class="mst" placeholder="Nhập MST..." /></td>
            <td><input placeholder="Nhập SĐT..." /></td>
            <td>
              <input
                class="tencty"
                placeholder="Tên công ty tự điền..."
                readonly
              />
            </td>
            <td>
              <select>
                <option value="HĐ">HĐ</option>
                <option value="CKS">CKS</option>
                <option value="BHXH">BHXH</option>
              </select>
            </td>
            <td><input value="Tuấn" /></td>
            <td><input placeholder="Ghi chú vấn đề..." /></td>
            <td>
              <div class="action-group">
                <button class="btn-tracuu" onclick="traCuu(this)">
                  Tra cứu
                </button>
                <button class="btn-luu" onclick="luuSheet(this)">Lưu</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <div id="detailCard" class="detail-card">
        <div class="detail-title">
          <i class="fa-solid fa-circle-info"></i> Thông tin chi tiết doanh nghiệp
        </div>
        <div class="detail-grid">
          <div class="detail-label">Người đại diện:</div>
          <div id="txtNguoiDaiDien" class="detail-value">Chưa có dữ liệu</div>
          
          <div class="detail-label">Địa chỉ trụ sở:</div>
          <div id="txtDiaChi" class="detail-value">Chưa có dữ liệu</div>
        </div>
      </div>

      <!-- <button class="btn-themdong" onclick="themDong()">+ Thêm dòng mới</button> -->
    </div>

    <script>
      function themDong() {
        const tbody = document.querySelector("#tblData tbody");
        const row = document.createElement("tr");

        row.innerHTML = `
          <td><input class="mst" placeholder="Nhập MST..."></td>
          <td><input placeholder="Nhập SĐT..."></td>
          <td><input class="tencty" placeholder="Tên công ty tự điền..." readonly></td>
          <td>
            <select>
              <option value="HĐ">HĐ</option>
              <option value="CKS">CKS</option>
              <option value="BHXH">BHXH</option>
            </select>
          </td>
          <td><input value="Tuấn"></td>
          <td><input placeholder="Ghi chú vấn đề..."></td>
          <td>
            <div class="action-group">
              <button class="btn-tracuu" onclick="traCuu(this)">Tra cứu</button>
              <button class="btn-luu" onclick="luuSheet(this)">Lưu</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      }

      async function traCuu(btn) {
        const row = btn.closest("tr");
        const mst = row.querySelector(".mst").value.trim();

        if (!mst) {
          alert("Vui lòng nhập MST");
          return;
        }

        const oTenCty = row.querySelector(".tencty");
        if (oTenCty) {
          oTenCty.style.backgroundColor = ""; // Xóa màu nền cũ (trở về mặc định)
          oTenCty.style.borderColor = ""; // Xóa màu viền cũ
          oTenCty.style.color = ""; // Xóa màu chữ cũ
          oTenCty.value = "Đang tra cứu..."; // Gợi ý trạng thái đang chạy
        }

        try {
          // ĐỔI TỪ api.php SANG GỌI SERVER PYTHON (FLASK) ĐANG CHẠY Ở CỔNG 5000
          // Đảm bảo viết như thế này (không có http://127.0.0.1 hay http://localhost ở trước)
          const response = await fetch(
            "api.php?mst=" + encodeURIComponent(mst),
          );
          const data = await response.json();

          // ĐỌC CHÍNH XÁC KEY 'ten_cong_ty' TỪ API PYTHON MỚI TRẢ VỀ
          if (data.success && data.ten_cong_ty) {
            row.querySelector(".tencty").value = data.ten_cong_ty;
          } else {
            row.querySelector(".tencty").value = "Không tìm thấy công ty!";
          }
        } catch (err) {
          console.error(err);
          row.querySelector(".tencty").value = "";
          alert("Tra cứu thất bại (Hãy kiểm tra Server Python đã bật chưa)");
        }
      }

      async function luuSheet(btn) {
        const oldText = btn.innerText;
        const row = btn.closest("tr");

        // 1. LẤY ĐỐI TƯỢNG CÁC Ô INPUT (Để nhuộm màu viền đỏ khi lỗi)
        const oMst = row.cells[0].querySelector("input");
        const oSdt = row.cells[1].querySelector("input");
        const oTenCty = row.cells[2].querySelector("input");
        const dichVuValue = row.cells[3].querySelector("select").value;
        const tenValue = row.cells[4].querySelector("input").value.trim();
        const oVande = row.cells[5].querySelector("input");

        // 2. RESET: Xóa bỏ màu đỏ lỗi của lần bấm trước đó trên các ô Input
        oMst.classList.remove("input-error");
        oSdt.classList.remove("input-error");
        oTenCty.classList.remove("input-error");
        oVande.classList.remove("input-error");

        // 3. KIỂM TRA: Ô nào trống thì vỗ class lỗi vào ô Input đó
        let hopLe = true;

        // Lấy giá trị đã cắt khoảng trắng để kiểm tra
        const mstValue = oMst.value.trim();
        const sdtValue = oSdt.value.trim();
        const tenCtyValue = oTenCty.value.trim();
        const vandeValue = oVande.value.trim();

        if (!mstValue) {
          oMst.classList.add("input-error");
          hopLe = false;
        }
        if (!sdtValue) {
          oSdt.classList.add("input-error");
          hopLe = false;
        }
        if (!tenCtyValue) {
          oTenCty.classList.add("input-error");
          hopLe = false;
        }
        if (!vandeValue) {
          oVande.classList.add("input-error");
          hopLe = false;
        }

        // Nếu có ít nhất 1 ô bị trống, dừng hàm ngay lập tức không cho lưu
        if (!hopLe) {
          return;
        }

        const data = {
          mst: mstValue,
          sdt: sdtValue,
          tencty: tenCtyValue,
          dichvu: dichVuValue,
          ten: tenValue,
          vande: vandeValue,
        };

        btn.disabled = true;
        btn.innerText = "Đang lưu...";

        try {
          await fetch(
            "https://script.google.com/macros/s/AKfycbySvD8PwyYwI-_tK9GiwuwNKfpxPLvdVGrXMpndexZADzlL8JQgjLXTqk0U_9f2TdkB/exec",
            {
              method: "POST",
              mode: "no-cors",
              headers: {
                "Content-Type": "text/plain",
              },
              body: JSON.stringify(data),
            },
          );

          const oTenCty = row.querySelector(".tencty");
          if (oTenCty) {
            oTenCty.style.backgroundColor = "#dcfce7";
            // oTenCty.style.borderColor = "#dcfce7";
            // oTenCty.style.color = "#dcfce7";
          }

          const toast = document.getElementById("toastNotification");
          toast.className = "toast show";

          setTimeout(function () {
            toast.className = "toast";
          }, 3000);
        } catch (err) {
          console.error(err);
          alert("Gặp lỗi khi lưu!");
        } finally {
          btn.disabled = false;
          btn.innerText = oldText;
        }
      }
    </script>
  </body>
</html>
